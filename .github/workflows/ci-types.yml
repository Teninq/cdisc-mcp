---
name: CI Types

'on':
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run type checks
        run: mypy src/
