---
name: CI Quality Gate

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository baseline
        run: |
          test -f README.md
          echo "Baseline checks passed"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/test_config.py tests/test_client.py tests/test_response_formatter.py tests/test_tools.py --tb=short
        env:
          CDISC_API_KEY: "test-placeholder"

      - name: Lint
        run: ruff check src/
